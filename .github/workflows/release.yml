name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: flux-vpn-linux-x64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: flux-vpn-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: flux-vpn-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: flux-vpn-windows-x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/flux-daemon*
